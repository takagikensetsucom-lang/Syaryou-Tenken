<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>社用車始業前点検</title>
  
  <!-- CSS Framework & Fonts -->
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
  
  <!-- Libraries -->
  <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.1.7/dist/signature_pad.umd.min.js"></script>
  <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/browser-image-compression@2.0.1/dist/browser-image-compression.js"></script>
  <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'Noto Sans JP', 'sans-serif'],
          },
          colors: {
            app: {
              bg: '#f3f4f6',
              card: '#ffffff',
              primary: '#3b82f6',
              primaryDark: '#2563eb',
              success: '#10b981',
              warning: '#f59e0b',
              danger: '#ef4444',
              text: '#111827',
              muted: '#6b7280',
              border: '#e5e7eb'
            }
          }
        }
      }
    }
  </script>

  <style>
    body {
      background-color: theme('colors.app.bg');
      color: theme('colors.app.text');
      -webkit-font-smoothing: antialiased;
    }
    .material-symbols-rounded {
      font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      vertical-align: middle;
    }
    
    /* Custom Radio/Checkbox Styles */
    .custom-radio:checked + label {
      border-color: theme('colors.app.primary');
      background-color: theme('colors.blue.50');
      color: theme('colors.app.primaryDark');
    }
    .custom-radio:checked + label .material-symbols-rounded {
      color: theme('colors.app.primary');
    }
    
    /* Signature Pad */
    .signature-wrapper {
      position: relative;
      background: white;
      border: 1px solid theme('colors.app.border');
      border-radius: 0.5rem;
      overflow: hidden;
    }
    .signature-wrapper canvas {
      display: block;
      width: 100%;
      height: 200px;
      touch-action: none;
    }
    
    /* Loaders */
    .loader {
      border: 3px solid #f3f3f3;
      border-top: 3px solid theme('colors.app.primary');
      border-radius: 50%;
      width: 24px;
      height: 24px;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    .hide { display: none !important; }
  </style>
</head>

<body class="pb-24">

  <!-- ==========================================
       ローディング画面
       ========================================== -->
  <div id="loading-overlay" class="fixed inset-0 bg-white/90 z-50 flex flex-col items-center justify-center transition-opacity duration-300">
    <div class="loader mb-4" style="width: 48px; height: 48px; border-width: 4px;"></div>
    <p id="loading-text" class="text-app-muted font-medium">初期化中...</p>
  </div>

  <!-- ==========================================
       ヘッダー
       ========================================== -->
  <header class="bg-white shadow-sm sticky top-0 z-40">
    <div class="max-w-md mx-auto px-4 py-3 flex items-center justify-between">
      <div class="flex items-center space-x-2">
        <div class="w-10 h-10 bg-blue-100 rounded-xl flex items-center justify-center text-app-primary">
          <span class="material-symbols-rounded text-2xl">local_shipping</span>
        </div>
        <div>
          <h1 class="font-bold text-lg leading-tight text-app-text">社用車始業前点検</h1>
        </div>
      </div>
      <button id="btn-logout" class="hide text-app-muted hover:text-app-danger p-2 rounded-full transition-colors">
        <span class="material-symbols-rounded">logout</span>
      </button>
    </div>
  </header>

  <main class="max-w-md mx-auto px-4 py-6 space-y-6 hide" id="main-content">
    
    <!-- ── ゲスト名入力（LIFF未連携時） ── -->
    <section id="guest-section" class="hide bg-white rounded-2xl shadow-sm border border-app-border overflow-hidden">
      <div class="p-4 bg-orange-50 border-b border-orange-100">
        <div class="flex items-center text-orange-700 font-semibold mb-2">
          <span class="material-symbols-rounded mr-1 text-20">warning</span> LINE連携されていません
        </div>
        <p class="text-sm text-orange-600">点検者の氏名を入力して開始してください。</p>
      </div>
      <div class="p-4">
        <input type="text" id="guest-name" placeholder="例: 山田 太郎" class="w-full bg-app-bg border border-app-border rounded-xl px-4 py-3 text-app-text focus:outline-none focus:ring-2 focus:ring-app-primary">
        <button id="btn-guest-start" class="mt-4 w-full bg-app-primary text-white rounded-xl py-3 font-bold shadow-md shadow-blue-200">この名前で開始</button>
      </div>
    </section>

    <!-- ── 点検フォーム（ユーザー名等があれば表示） ── -->
    <div id="form-container" class="space-y-6 hide">
      
      <!-- ユーザー情報表示 -->
      <div>
        <div class="flex items-center space-x-2 mb-2 px-1">
          <div class="w-1 h-4 bg-app-primary rounded-full"></div>
          <h2 class="font-bold text-app-muted text-sm">点検者情報</h2>
        </div>
        <div class="bg-white rounded-xl shadow-sm border border-app-border p-4 flex items-center justify-between">
          <span class="text-app-muted">氏名:</span>
          <span id="display-user-name" class="font-bold text-lg text-app-text">未設定</span>
        </div>
      </div>

      <!-- 車両選択 -->
      <div>
        <div class="flex items-center space-x-2 mb-2 px-1">
          <div class="w-1 h-4 bg-app-primary rounded-full"></div>
          <h2 class="font-bold text-app-muted text-sm">対象車両<span class="text-app-danger ml-1">*</span></h2>
        </div>
        <div class="bg-white rounded-xl shadow-sm border border-app-border p-1 relative">
          <select id="vehicle-select" class="w-full appearance-none bg-transparent py-3 pl-4 pr-10 outline-none text-app-text font-medium z-10 relative">
            <option value="" disabled selected>読み込み中...</option>
          </select>
          <div class="absolute right-3 top-1/2 -translate-y-1/2 pointer-events-none text-app-muted z-0">
            <span class="material-symbols-rounded">unfold_more</span>
          </div>
        </div>
      </div>

      <!-- タイヤ点検 -->
      <div>
        <div class="flex items-center space-x-2 mb-2 px-1">
          <div class="w-1 h-4 bg-app-warning rounded-full"></div>
          <h2 class="font-bold text-app-muted text-sm">タイヤ点検</h2>
        </div>
        <div class="bg-white rounded-xl shadow-sm border border-app-border p-4 space-y-4">
          <div>
            <label class="block text-sm text-app-muted mb-2">タイヤ状態 <span class="text-app-danger">*</span></label>
            <div class="grid grid-cols-2 gap-3">
              <div>
                <input type="radio" id="tire-ok" name="tire-condition" value="正常" class="hidden custom-radio">
                <label for="tire-ok" class="flex items-center justify-center py-3 border border-app-border rounded-xl cursor-pointer transition-all">
                  <span class="material-symbols-rounded mr-1 text-app-muted">check_circle</span> 正常
                </label>
              </div>
              <div>
                <input type="radio" id="tire-ng" name="tire-condition" value="異常あり" class="hidden custom-radio">
                <label for="tire-ng" class="flex items-center justify-center py-3 border border-app-border rounded-xl cursor-pointer transition-all">
                  <span class="material-symbols-rounded mr-1 text-app-muted">error</span> 異常あり
                </label>
              </div>
            </div>
          </div>
          <div>
            <label class="block text-sm text-app-muted mb-2">タイヤ溝深さ <span class="text-app-danger">*</span></label>
            <div class="relative">
              <select id="tire-depth" class="w-full appearance-none bg-app-bg border border-app-border rounded-xl py-3 pl-4 pr-10 outline-none">
                <option value="" disabled selected>-- 選択してください --</option>
                <option value="十分（4mm以上）">十分（4mm以上）</option>
                <option value="やや摩耗（2〜4mm）">やや摩耗（2〜4mm）</option>
                <option value="要交換（2mm未満）">要交換（2mm未満）</option>
                <option value="スリップサイン露出">スリップサイン露出</option>
              </select>
              <div class="absolute right-3 top-1/2 -translate-y-1/2 pointer-events-none text-app-muted"><span class="material-symbols-rounded">unfold_more</span></div>
            </div>
          </div>
        </div>
      </div>

      <!-- メーター確認 -->
      <div>
        <div class="flex items-center space-x-2 mb-2 px-1">
          <div class="w-1 h-4 bg-app-success rounded-full"></div>
          <h2 class="font-bold text-app-muted text-sm">メーター点検</h2>
        </div>
        <div class="bg-white rounded-xl shadow-sm border border-app-border p-4 space-y-4">
          <div>
            <label class="block text-sm text-app-muted mb-2">メーター写真 <span class="text-app-danger">*</span></label>
            <div id="meter-photo-area" class="border-2 border-dashed border-app-border rounded-xl bg-app-bg text-center cursor-pointer hover:border-app-primary transition-colors overflow-hidden flex flex-col items-center justify-center min-h-[140px]" onclick="document.getElementById('meter-photo-input').click()">
              <div id="meter-placeholder">
                <span class="material-symbols-rounded text-4xl text-blue-300">speed</span>
                <p class="text-sm text-app-muted mt-2">タップして撮影</p>
              </div>
              <img id="meter-img-preview" class="hide w-full h-full object-cover">
            </div>
            <input type="file" id="meter-photo-input" accept="image/*" capture="environment" class="hidden" onchange="handlePhotoSelect(this, 'meter')">
            <button id="meter-photo-remove" class="hide mt-2 text-sm text-app-danger border border-app-danger rounded px-3 py-1 bg-red-50" onclick="removePhoto('meter')">撮り直す</button>
          </div>

          <div>
            <label class="block text-sm text-app-muted mb-2">異常警告ランプ <span class="text-app-danger">*</span></label>
            <div class="grid grid-cols-2 gap-3">
              <div>
                <input type="radio" id="lamp-none" name="warning-lights" value="なし" class="hidden custom-radio">
                <label for="lamp-none" class="flex items-center justify-center py-3 border border-app-border rounded-xl cursor-pointer transition-all">
                  <span class="material-symbols-rounded mr-1 text-app-muted">check_circle</span> なし
                </label>
              </div>
              <div>
                <input type="radio" id="lamp-yes" name="warning-lights" value="あり" class="hidden custom-radio">
                <label for="lamp-yes" class="flex items-center justify-center py-3 border border-app-border rounded-xl cursor-pointer transition-all">
                  <span class="material-symbols-rounded mr-1 text-app-muted">warning</span> あり
                </label>
              </div>
            </div>
          </div>

          <div>
            <label class="block text-sm text-app-muted mb-2">走行メーター値 (km) <span class="text-app-danger">*</span></label>
            <input type="number" id="odometer" placeholder="例: 54321" inputmode="numeric" class="w-full bg-app-bg border border-app-border rounded-xl py-3 px-4 outline-none">
          </div>
        </div>
      </div>

      <!-- 外観＆車内ゴミ -->
      <div>
        <div class="flex items-center space-x-2 mb-2 px-1">
          <div class="w-1 h-4 bg-purple-500 rounded-full"></div>
          <h2 class="font-bold text-app-muted text-sm">外観・車内点検</h2>
        </div>
        <div class="bg-white rounded-xl shadow-sm border border-app-border p-4 space-y-4">
          <div>
            <label class="block text-sm text-app-muted mb-2">外観写真（損傷がある場合）</label>
            <div id="exterior-photo-area" class="border-2 border-dashed border-app-border rounded-xl bg-app-bg text-center cursor-pointer hover:border-purple-400 transition-colors overflow-hidden flex flex-col items-center justify-center min-h-[120px]" onclick="document.getElementById('exterior-photo-input').click()">
              <div id="exterior-placeholder">
                <span class="material-symbols-rounded text-3xl text-purple-300">add_a_photo</span>
                <p class="text-sm text-app-muted mt-1">タップして撮影</p>
              </div>
              <img id="exterior-img-preview" class="hide w-full h-full object-cover">
            </div>
            <input type="file" id="exterior-photo-input" accept="image/*" capture="environment" class="hidden" onchange="handlePhotoSelect(this, 'exterior')">
            <button id="exterior-photo-remove" class="hide mt-2 text-sm text-app-danger border border-app-danger rounded px-3 py-1 bg-red-50" onclick="removePhoto('exterior')">撮り直す</button>
          </div>
          <div>
            <label class="block text-sm text-app-muted mb-2">損傷箇所メモ</label>
            <textarea id="damage-memo" placeholder="（任意）右バンパーに擦り傷あり等" class="w-full bg-app-bg border border-app-border rounded-xl py-3 px-4 outline-none resize-y min-h-[80px]"></textarea>
          </div>
          <hr class="border-app-border">
          <div>
            <label class="block text-sm text-app-muted mb-2">車内ゴミ状況 <span class="text-app-danger">*</span></label>
            <div class="grid grid-cols-2 gap-3">
              <div>
                <input type="radio" id="garbage-clean" name="garbage-check" value="清潔" class="hidden custom-radio">
                <label for="garbage-clean" class="flex items-center justify-center py-3 border border-app-border rounded-xl cursor-pointer transition-all">
                  <span class="material-symbols-rounded mr-1 text-app-muted">sentiment_satisfied</span> 清潔
                </label>
              </div>
              <div>
                <input type="radio" id="garbage-dirty" name="garbage-check" value="清掃必要" class="hidden custom-radio">
                <label for="garbage-dirty" class="flex items-center justify-center py-3 border border-app-border rounded-xl cursor-pointer transition-all">
                  <span class="material-symbols-rounded mr-1 text-app-muted">delete_sweep</span> 清掃必要
                </label>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- 備考＆署名 -->
      <div>
        <div class="flex items-center space-x-2 mb-2 px-1">
          <div class="w-1 h-4 bg-gray-500 rounded-full"></div>
          <h2 class="font-bold text-app-muted text-sm">確認・署名</h2>
        </div>
        <div class="bg-white rounded-xl shadow-sm border border-app-border p-4 space-y-4">
          <div>
            <label class="block text-sm text-app-muted mb-2">備考欄</label>
            <textarea id="notes" placeholder="（任意）特になし" class="w-full bg-app-bg border border-app-border rounded-xl py-3 px-4 outline-none resize-y min-h-[80px]"></textarea>
          </div>
          <div>
            <div class="flex justify-between items-end mb-2">
              <label class="block text-sm text-app-muted">点検者署名 <span class="text-app-danger">*</span></label>
              <button onclick="clearSignature()" class="text-xs text-app-primary flex items-center">
                <span class="material-symbols-rounded text-[14px] mr-1">refresh</span> クリア
              </button>
            </div>
            <div class="signature-wrapper">
              <canvas id="signature-pad"></canvas>
            </div>
          </div>
        </div>
      </div>

      <!-- 送信ボタン -->
      <button id="btn-submit" class="w-full bg-gradient-to-r from-blue-500 to-indigo-600 text-white font-bold text-lg rounded-xl py-4 flex flex-col items-center justify-center shadow-lg shadow-blue-500/30">
        <span>この内容で点検報告する</span>
      </button>

    </div>

  </main>

  <!-- ==========================================
       完了画面
       ========================================== -->
  <div id="success-screen" class="hide min-h-[80vh] flex flex-col items-center justify-center px-4">
    <div class="w-20 h-20 bg-green-100 rounded-full flex items-center justify-center mb-6">
      <span class="material-symbols-rounded text-5xl text-app-success">check_circle</span>
    </div>
    <h2 class="text-2xl font-bold text-app-text mb-2">報告完了！</h2>
    <p class="text-app-muted text-center mb-8">点検のご協力ありがとうございました。<br>今日も安全運転でいってらっしゃい！</p>
    <button onclick="location.reload()" class="w-full max-w-[240px] bg-app-bg border border-app-border text-app-text font-bold rounded-xl py-3 shadow-sm hover:bg-gray-100">
      新しい入力をする
    </button>
  </div>

  <script>
    // =====================================
    // 構成・設定
    // =====================================
    // ★ 以下のURLを、新しいGAS WebアプリのURL（/exec まで）に置き換えてください！
    const GAS_API_URL = "https://script.google.com/macros/s/AKfycbyCihw37A_S9Tq-fQ9R012j5vHDB_1ZEXF4D1yqU8M62V0u-s3d-E_F4U8d-g/exec";
    
    const LIFF_ID = "2006323631-V0wR1aYy"; // 設定済みのLIFF ID

    let appState = {
      userId: "",
      userName: "",
      vehicles: [],
      selectedVehicleId: ""
    };
    
    // 取得データを保持
    let photoData = { meter: null, exterior: null };
    let signaturePad;

    // DOM要素
    const UI = {
      loading: document.getElementById('loading-overlay'),
      loadingText: document.getElementById('loading-text'),
      main: document.getElementById('main-content'),
      guestSec: document.getElementById('guest-section'),
      formSec: document.getElementById('form-container'),
      successSec: document.getElementById('success-screen'),
      vehSelect: document.getElementById('vehicle-select'),
      displayName: document.getElementById('display-user-name'),
      submitBtn: document.getElementById('btn-submit')
    };

    window.onload = async () => {
      initSignature();
      await initialize();
    };

    function initSignature() {
      const canvas = document.getElementById('signature-pad');
      // Retinaディスプレイ等の解像度対応
      const ratio = Math.max(window.devicePixelRatio || 1, 1);
      canvas.width = canvas.offsetWidth * ratio;
      canvas.height = canvas.offsetHeight * ratio;
      canvas.getContext("2d").scale(ratio, ratio);
      signaturePad = new SignaturePad(canvas, { penColor: "rgb(0, 0, 0)", backgroundColor: "rgba(255, 255, 255, 1)" });
    }

    function clearSignature() {
      if (signaturePad) signaturePad.clear();
    }

    function showLoading(msg = '処理中...') {
      UI.loadingText.innerText = msg;
      UI.loading.classList.remove('hide');
    }
    function hideLoading() {
      UI.loading.classList.add('hide');
    }

    // =====================================
    // 起動・初期化 (超高速化 キャッシュ対応)
    // =====================================
    async function initialize() {
      const urlParams = new URLSearchParams(window.location.search);
      appState.selectedVehicleId = urlParams.get('id') || urlParams.get('vehicleId') || "";

      // ──────────────────────────────────────────
      // 高速化：ローカルストレージのキャッシュを確認
      // ──────────────────────────────────────────
      let useCache = false;
      try {
        const cachedVehicles = localStorage.getItem('__st_vehicles_cache');
        const cachedUser = localStorage.getItem('__st_user_cache');
        if (cachedVehicles && cachedUser) {
           appState.vehicles = JSON.parse(cachedVehicles);
           const uData = JSON.parse(cachedUser);
           appState.userId = uData.userId || "";
           appState.userName = uData.userName || "";
           
           renderVehicles();
           UI.displayName.innerText = appState.userName;
           
           // キャッシュがあれば即座にUI表示（ロード画面を消す）
           UI.guestSec.classList.add('hide');
           UI.formSec.classList.remove('hide');
           hideLoading();
           UI.main.classList.remove('hide');
           useCache = true;
        }
      } catch(e) {}

      // LIFF初期化
      if (!useCache) showLoading("LINE通信中...");
      
      try {
        await liff.init({ liffId: LIFF_ID });
        if (liff.isLoggedIn()) {
          const profile = await liff.getProfile();
          appState.userId = profile.userId;
        } else {
           // キャッシュ表示していなければゲスト画面へ
           if (!useCache) {
             hideLoading();
             UI.main.classList.remove('hide');
             UI.guestSec.classList.remove('hide');
             return;
           }
        }
      } catch (err) {
        console.warn("LIFF 起動エラー:", err);
      }

      // ゲスト名入力を待っている場合は自動取得しない
      if (!appState.userId && !useCache) {
         hideLoading();
         UI.main.classList.remove('hide');
         UI.guestSec.classList.remove('hide');
         return;
      }

      // API から最新の車両と社員マスタ名称の情報をとる (キャッシュあれば裏で更新)
      fetchMasterData(useCache);
    }

    document.getElementById('btn-guest-start').addEventListener('click', () => {
      const gName = document.getElementById('guest-name').value.trim();
      if (!gName) { alert("氏名を入力してください"); return; }
      appState.userId = "GUEST";
      appState.userName = gName;
      UI.guestSec.classList.add('hide');
      fetchMasterData(false); // ゲスト用ローダー表示で取得
    });

    async function fetchMasterData(isSilent) {
      if (!isSilent) showLoading("サーバーデータ取得中...");
      try {
        const payload = {
          action: 'getInitialData',
          userId: appState.userId
        };
        const response = await fetch(GAS_API_URL, {
          method: "POST",
          headers: { 'Content-Type': 'text/plain' },
          body: JSON.stringify(payload)
        });
        const res = await response.json();
        if (res.success) {
          appState.vehicles = res.vehicles;
          if (res.user && res.user.name) {
            appState.userName = res.user.name;
          }

          // 最新データをキャッシュに上書き保存
          localStorage.setItem('__st_vehicles_cache', JSON.stringify(appState.vehicles));
          localStorage.setItem('__st_user_cache', JSON.stringify({
            userId: appState.userId,
            userName: appState.userName
          }));

          UI.displayName.innerText = appState.userName;
          renderVehicles();
          
          if (!isSilent) {
             hideLoading();
             UI.main.classList.remove('hide');
             UI.formSec.classList.remove('hide');
          }
        } else {
          throw new Error(res.error);
        }
      } catch (err) {
        if (!isSilent) {
           hideLoading();
           alert("通信エラー: " + err.message);
        }
      }
    }

    function renderVehicles() {
      const currentVal = UI.vehSelect.value; // 再描画時に選択を維持
      UI.vehSelect.innerHTML = '<option value="" disabled selected>-- 選択してください --</option>';
      appState.vehicles.forEach(v => {
        const opt = document.createElement('option');
        opt.value = v.vehicleId;
        opt.textContent = `${v.vehicleName} (${v.vehicleNumber})`;
        UI.vehSelect.appendChild(opt);
      });
      if (appState.selectedVehicleId) UI.vehSelect.value = appState.selectedVehicleId;
      else if (currentVal) UI.vehSelect.value = currentVal;
    }

    // =====================================
    // 写真圧縮・プレビュー
    // =====================================
    async function handlePhotoSelect(input, type) {
      if (!input.files || input.files.length === 0) return;
      const file = input.files[0];
      try {
        showLoading("画像圧縮中...");
        const options = { maxSizeMB: 1, maxWidthOrHeight: 1200, useWebWorker: true };
        const compressedFile = await imageCompression(file, options);
        
        const b64 = await imageCompression.getDataUrlFromFile(compressedFile);
        photoData[type] = {
           data: b64,
           name: compressedFile.name,
           mimeType: compressedFile.type
        };

        // プレビュー表示
        document.getElementById(`${type}-placeholder`).classList.add('hide');
        const img = document.getElementById(`${type}-img-preview`);
        img.src = URL.createObjectURL(compressedFile);
        img.classList.remove('hide');
        document.getElementById(`${type}-photo-remove`).classList.remove('hide');
        
        document.getElementById(`${type}-photo-area`).classList.remove('border-dashed');
        document.getElementById(`${type}-photo-area`).classList.add('border-solid', 'border-app-primary');
        hideLoading();
      } catch (err) {
        hideLoading();
        alert("画像の処理に失敗しました。");
      }
    }

    function removePhoto(type) {
      photoData[type] = null;
      document.getElementById(`${type}-photo-input`).value = "";
      document.getElementById(`${type}-placeholder`).classList.remove('hide');
      document.getElementById(`${type}-img-preview`).classList.add('hide');
      document.getElementById(`${type}-photo-remove`).classList.add('hide');
      document.getElementById(`${type}-photo-area`).classList.add('border-dashed');
      document.getElementById(`${type}-photo-area`).classList.remove('border-solid', 'border-app-primary');
    }

    // =====================================
    // 送信処理
    // =====================================
    UI.submitBtn.addEventListener('click', async () => {
      // 1. バリデーション
      const vId = UI.vehSelect.value;
      if (!vId) { alert("車両を選択してください"); UI.vehSelect.focus(); return; }

      const vItem = appState.vehicles.find(x => x.vehicleId === vId);
      const vName = vItem ? vItem.vehicleName : "";

      const tireCond = document.querySelector('input[name="tire-condition"]:checked');
      if (!tireCond) { alert("タイヤ状態を選択してください"); return; }

      const tireDepth = document.getElementById('tire-depth').value;
      if (!tireDepth) { alert("タイヤ溝深さを選択してください"); return; }

      if (!photoData.meter) { alert("メーター写真を撮影してください"); return; }

      const wLight = document.querySelector('input[name="warning-lights"]:checked');
      if (!wLight) { alert("異常警告ランプの有無を選択してください"); return; }

      const odo = document.getElementById('odometer').value.trim();
      if (!odo) { alert("走行メーター値を入力してください"); document.getElementById('odometer').focus(); return; }

      const garbage = document.querySelector('input[name="garbage-check"]:checked');
      if (!garbage) { alert("車内ゴミ状況を選択してください"); return; }

      if (signaturePad.isEmpty()) { alert("点検者署名を記入してください"); return; }

      // 2. データまとめ
      const payloadData = {
        action: 'uploadDataAndFiles',
        data: {
          userId: appState.userId,
          inspectorName: appState.userName,
          vehicleId: vId,
          vehicleName: vName,
          tireCondition: tireCond.value,
          tireDepth: tireDepth,
          warningLights: wLight.value,
          odometerValue: odo,
          garbageCheck: garbage.value,
          damageMemo: document.getElementById('damage-memo').value.trim(),
          notes: document.getElementById('notes').value.trim(),
          signature_data: signaturePad.toDataURL("image/png")
        },
        compressedFiles: {}
      };
      if (photoData.meter) payloadData.compressedFiles["meter"] = photoData.meter;
      if (photoData.exterior) payloadData.compressedFiles["exterior"] = photoData.exterior;

      // 3. 通信
      showLoading("送信中... 画像のアップロードは少し時間がかかります");
      try {
        const response = await fetch(GAS_API_URL, {
          method: "POST",
          headers: { "Content-Type": "text/plain" },
          body: JSON.stringify(payloadData)
        });
        const res = await response.json();
        
        hideLoading();
        if (res.success) {
          UI.main.classList.add('hide');
          UI.successSec.classList.remove('hide');
        } else {
          alert("送信エラー: " + res.error);
        }
      } catch (err) {
        hideLoading();
        alert("通信障害が発生しました。インターネット環境を確認してください。\nError: " + err.message);
      }
    });

  </script>
</body>
</html>
